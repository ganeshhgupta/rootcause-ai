version: "3.9"

services:
  simulator:
    build: ./simulator
    ports:
      - "8001:8001"
    env_file: .env
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - simulator
    volumes:
      - chroma_data:/app/chroma_db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  chroma_data:
